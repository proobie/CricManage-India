services:
  - type: web
    name: cricmanage-india
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: waitress-serve --listen=0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      # For SQLite persistence on Render, create a Disk and set SQLITE_PATH to:
      # sqlite:////var/data/cricmanage.sqlite3
      # (see README → Render deployment)

